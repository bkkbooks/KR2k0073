body:
  text: 崑崙河源考地理類四河渠之屬提要臣等謹案崑崙河源考一卷國朝萬斯同撰斯同有廟制圖考已著録是書以元篤什言河源崑崙與史記漢書不合水經所載亦有謬誤因厯引禹貢禹本紀爾雅淮南子及各史之文以攷證之考張騫言河源出鹽澤司馬遷又言河源出于闐天子案古圖書名河所出山曰崑崙後來諸書都無異說唐書吐谷渾傳始有李靖望積石山覽觀河源之言而亦未確有所指迨至篤什奉命行求稱得之朶甘思西鄙潘昂霄等妄為附㑹經傳音譯舛訛遂以鄂敦塔拉之潛行復見者指為河源以阿木尼瑪勒占木遜山即古積石山者指為崑崙元史因而採入地理志中耳食相沿混淆益甚我國家徳威遐播天山兩道盡入版圖月竁以西皆我户闥案圖考索知河有重源篤什所訪僅及其伏地再出者而河水之出葱嶺于闐注鹽澤潛行至積石者則篤什皆未之見伏讀御批通鑑輯覽攷辨精詳河源始確有定論斯同此書作於康熈之初核以今所目驗亦尚不盡脗合然其時西域未通尚未得其實據而斯同穿穴古書㕘稽同異即能灼知張騫所說之不誣而極論潘昂霄等之背馳瞀亂凡所指陳俱不甚相逺亦可謂工於考證不汨沒於舊說者矣録存其書益以見睿鑒折衷超軼萬古也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀崑崙河源考原序河之患為日久矣至於今而挾清淮之勢以震撼揚州環數千里潰決衝突岌岌有崩城壊郭之虞上煩萬乗之荒度下厪公卿百執事之胼胝迄無奏績之期於是抵掌而談河防者各挾一必勝之策至源委利弊之所以然或未必得其詳也季野萬先生留心經世之學於前代治河開塞修防之策犁然有會於心顧未嘗肯輕言于人即雅重先生者亦未知其用心之勤有如此也一日先生出崑崙考一帙示予竊服其徵引之博辨証之精顧或以為不究治河之流而徒探其源似非今日急務不知天下事當其任者可言之可行之尚且有牽制之形游移之見而書生抱杞人之憂㨿紙上之談於國家大計何當焉惟是讀書論古辨畛畫疆上下於古今得失之林斯誠博雅之所有事况河之源雖荒逺其載於史傳旁見於他書者皆一一可徵先生據諸説而折􅇆之俾世之談治河者言流而不昧源於立言之㫖又何傷乎設荷天子寵靈河伯效若不日錫圭告功將有事於崑崙則一介之使挾先生是書過積石踰䀋澤馳騁絶域以求所謂真崑崙者一洗千古之惑豈不偉哉雖然吾願世之人毋徒以是求先生也康熙庚辰夏六月十有一日侯官林佶序於京師琉璃厰西栁巷之寓舍
